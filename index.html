<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>身心靈健康追蹤</title>

  <!-- React & Recharts via CDN (no installation needed) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:#F5EFE6;overscroll-behavior:none;}
    :root{
      --cream:#F5EFE6;--parchment:#EDE3D4;
      --sage:#7A9E7E;--sage-light:#B4CFBA;--sage-dark:#4A7A50;
      --rose:#C08070;--rose-light:#E8C4B8;
      --amber:#C89A50;--lavender:#8C7FA8;
      --ink:#3A3028;--muted:#8A7A6A;
      --card:rgba(255,255,255,0.72);--border:rgba(180,160,140,0.3);
      --shadow:0 4px 24px rgba(80,60,40,0.08);
    }
    .cormorant{font-family:'Cormorant Garamond',serif;}
    .glass{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);}
    .btn-primary{background:linear-gradient(135deg,var(--sage),var(--sage-dark));color:#fff;border:none;border-radius:14px;padding:14px 24px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;width:100%;}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(74,122,80,.3);}
    .btn-ghost{background:transparent;border:1.5px solid var(--border);border-radius:12px;padding:10px 18px;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--muted);transition:all .2s;}
    .btn-ghost:hover{background:var(--parchment);color:var(--ink);}
    input,textarea,select{font-family:'DM Sans',sans-serif;background:var(--parchment);border:1.5px solid var(--border);border-radius:14px;padding:12px 16px;font-size:15px;color:var(--ink);width:100%;outline:none;transition:border-color .2s;}
    input:focus,textarea:focus,select:focus{border-color:var(--sage);}
    label{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:6px;}
    .scroll-hide::-webkit-scrollbar{display:none;}
    .scroll-hide{-ms-overflow-style:none;scrollbar-width:none;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
    .fade-up{animation:fadeUp .35s ease forwards;}
    input[type=range]{-webkit-appearance:none;appearance:none;height:8px;border-radius:4px;outline:none;cursor:pointer;border:none;padding:0;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:white;border:3px solid var(--sage);box-shadow:0 2px 8px rgba(0,0,0,.15);cursor:pointer;}
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;
const {LineChart,Line,XAxis,YAxis,CartesianGrid,Tooltip,
       ResponsiveContainer,PieChart,Pie,Cell,Legend} = Recharts;

/* ── CONSTANTS ── */
const STORAGE_KEY = "wellness_v2";
const EMOTION_TAGS = ["平靜","喜悅","感恩","焦慮","疲憊","孤獨","充實","迷茫","愛","憤怒","希望","壓力"];
const IMPACT_CATEGORIES = {
  weather:{label:"天氣",icon:"🌤",color:"#C89A50",sub:["晴天","雨天","陰天","悶熱","涼爽"]},
  friends:{label:"朋友",icon:"👥",color:"#7A9E7E",sub:["Friend A","Friend B","Friend C","家人"]},
  health: {label:"健康",icon:"💚",color:"#8C7FA8",sub:["睡眠好","睡眠差","運動了","身體不適"]},
  work:   {label:"工作",icon:"💼",color:"#C08070",sub:["工作順利","壓力大","有成就感","無聊"]},
};
const HD_TYPES=["Generator","Manifesting Generator","Projector","Manifestor","Reflector"];
const HD_STRATEGIES=["等待回應","等待邀請","通知後行動","等待月相循環","等待滿足感"];
const HD_AUTHORITIES=["骶骨","情感","脾臟","自我投射","心臟","意志力","無"];
const ZIWEI_STARS=["紫微","天機","太陽","武曲","天同","廉貞","天府","太陰","貪狼","巨門","天相","天梁","七殺","破軍"];

/* ── STORAGE ── */
const defaultData=()=>({profile:{name:"",birthday:"",birthTime:"",hdType:"",hdStrategy:"",hdAuthority:"",ziWeiStar:""},entries:[]});
const loadData=()=>{try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||defaultData();}catch{return defaultData();}};
const saveData=d=>localStorage.setItem(STORAGE_KEY,JSON.stringify(d));

/* ── SEED DEMO ── */
const seedDemo=data=>{
  if(data.entries.length>0)return data;
  const today=new Date();
  const moodPool=[4,6,3,7,5,8,2,6,7,4,5,3,8,6,5,7,4,6,8,5,3,7,6,4,5,8,7,6,5,4];
  const catPool=["weather","friends","health","work","friends","health","weather","work"];
  const demos=[];
  for(let i=29;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const cat=catPool[i%catPool.length];
    const sub=IMPACT_CATEGORIES[cat].sub[i%IMPACT_CATEGORIES[cat].sub.length];
    demos.push({id:`demo_${i}`,timestamp:d.toISOString(),moodScore:moodPool[i]||5,
      emotionTags:[EMOTION_TAGS[i%EMOTION_TAGS.length],EMOTION_TAGS[(i+3)%EMOTION_TAGS.length]],
      impactFactors:[{category:cat,detail:sub}],notes:""});
  }
  return{...data,entries:demos};
};

/* ── MOOD ── */
const moodLevel=s=>{
  if(s<=3)return{label:"Low",color:"#C08070",emoji:"🌧"};
  if(s<=6)return{label:"Normal",color:"#C89A50",emoji:"🌤"};
  return{label:"Great",color:"#7A9E7E",emoji:"☀️"};
};

/* ── INSIGHTS ── */
const computeInsights=(entries,profile)=>{
  if(!entries.length)return null;
  const sorted=[...entries].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  const last3=sorted.slice(0,3);
  const allLow=last3.length===3&&last3.every(e=>e.moodScore<=3);
  const hdWarning=allLow&&["Projector","Reflector"].includes(profile.hdType);
  const freq={};
  entries.forEach(e=>(e.impactFactors||[]).forEach(f=>{
    if(!freq[f.category])freq[f.category]={count:0,subs:{}};
    freq[f.category].count++;
    if(!freq[f.category].subs[f.detail])freq[f.category].subs[f.detail]=0;
    freq[f.category].subs[f.detail]++;
  }));
  return{allLow,hdWarning,last3,freq};
};

/* ── TREND CHART ── */
function TrendChart({entries}){
  const data=[...entries].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)).slice(-30).map(e=>({
    date:new Date(e.timestamp).toLocaleDateString("zh-TW",{month:"numeric",day:"numeric"}),
    score:e.moodScore
  }));
  const CustomDot=(props)=>{
    const{cx,cy,payload}=props;
    return <circle cx={cx} cy={cy} r={4} fill={moodLevel(payload.score).color} stroke="white" strokeWidth={2}/>;
  };
  return(
    <ResponsiveContainer width="100%" height={190}>
      <LineChart data={data} margin={{top:8,right:8,left:-22,bottom:0}}>
        <CartesianGrid strokeDasharray="3 3" stroke="rgba(180,160,140,0.2)"/>
        <XAxis dataKey="date" tick={{fontSize:10,fill:"#8A7A6A"}} interval="preserveStartEnd"/>
        <YAxis domain={[1,10]} tick={{fontSize:10,fill:"#8A7A6A"}} ticks={[1,4,7,10]}/>
        <Tooltip contentStyle={{background:"rgba(255,255,255,.95)",border:"1px solid #E8DDD0",borderRadius:12,fontSize:13}}
          formatter={v=>[`${v} ${moodLevel(v).emoji} ${moodLevel(v).label}`,"心情"]}/>
        <Line type="monotone" dataKey="score" stroke="#7A9E7E" strokeWidth={2.5} dot={<CustomDot/>} activeDot={{r:6}}/>
      </LineChart>
    </ResponsiveContainer>
  );
}

/* ── IMPACT PIE ── */
function ImpactPie({freq}){
  const [activeSlice,setActiveSlice]=useState(null);
  const RADIAN=Math.PI/180;
  const renderLabel=({cx,cy,midAngle,innerRadius,outerRadius,name,percent})=>{
    if(percent<0.09)return null;
    const r=innerRadius+(outerRadius-innerRadius)*0.5;
    const x=cx+r*Math.cos(-midAngle*RADIAN),y=cy+r*Math.sin(-midAngle*RADIAN);
    return <text x={x} y={y} textAnchor="middle" dominantBaseline="central" fontSize={11} fill="white" fontWeight={500}>{name}</text>;
  };
  const mainData=Object.entries(freq).map(([cat,val])=>({
    name:IMPACT_CATEGORIES[cat]?.label||cat,value:val.count,
    color:IMPACT_CATEGORIES[cat]?.color||"#999",catKey:cat,subs:val.subs
  }));
  const subData=activeSlice
    ?Object.entries(activeSlice.subs).map(([sub,count],i)=>({name:sub,value:count,color:activeSlice.color,i}))
    :[];
  return(
    <div>
      <div style={{textAlign:"center",fontSize:12,color:"var(--muted)",marginBottom:6}}>
        {activeSlice?(
          <span><b style={{color:activeSlice.color}}>{activeSlice.name}</b> 細項
            {" · "}<span style={{cursor:"pointer",textDecoration:"underline"}} onClick={()=>setActiveSlice(null)}>← 返回</span>
          </span>
        ):"點擊扇形查看細項"}
      </div>
      <ResponsiveContainer width="100%" height={190}>
        <PieChart>
          {!activeSlice?(
            <Pie data={mainData} dataKey="value" cx="50%" cy="50%" outerRadius={80}
              labelLine={false} label={renderLabel} onClick={d=>setActiveSlice(d)} style={{cursor:"pointer"}}>
              {mainData.map((d,i)=><Cell key={i} fill={d.color} stroke="white" strokeWidth={2}/>)}
            </Pie>
          ):(
            <Pie data={subData} dataKey="value" cx="50%" cy="50%" outerRadius={80}
              labelLine={false} label={renderLabel}>
              {subData.map((d,i)=><Cell key={i} fill={d.color} opacity={0.4+(i/subData.length)*0.6} stroke="white" strokeWidth={2}/>)}
            </Pie>
          )}
          <Tooltip contentStyle={{background:"rgba(255,255,255,.95)",border:"1px solid #E8DDD0",borderRadius:12,fontSize:13}}/>
          <Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:12,color:"var(--muted)"}}/>
        </PieChart>
      </ResponsiveContainer>
    </div>
  );
}

/* ── WARNING BANNER ── */
function WarningBanner({insights,profile}){
  if(!insights?.allLow)return null;
  return(
    <div className="fade-up" style={{background:"linear-gradient(135deg,rgba(192,128,112,.13),rgba(140,127,168,.13))",
      border:"1.5px solid rgba(192,128,112,.4)",borderRadius:16,padding:"14px 16px",marginBottom:14,
      display:"flex",gap:10,alignItems:"flex-start"}}>
      <span style={{fontSize:22}}>⚠️</span>
      <div>
        <div style={{fontSize:14,fontWeight:600,color:"#C08070",marginBottom:4}}>決策警告</div>
        <div style={{fontSize:13,color:"var(--ink)",lineHeight:1.6}}>
          您已連續 3 天心情低落。
          {insights.hdWarning&&<span>根據您的人類圖類型（{profile.hdType}），目前可能處於「非自己主題」，</span>}
          建議暫緩重大決策，多給自己一些空間。🌿
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   HOME VIEW
═══════════════════════════════════════════ */
function HomeView({data,setView}){
  const insights=computeInsights(data.entries,data.profile);
  const sorted=[...data.entries].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  const today=sorted[0];
  const avg=data.entries.length?(data.entries.reduce((s,e)=>s+e.moodScore,0)/data.entries.length).toFixed(1):"--";
  const week=data.entries.filter(e=>(new Date()-new Date(e.timestamp))/86400000<=7);
  const weekAvg=week.length?(week.reduce((s,e)=>s+e.moodScore,0)/week.length).toFixed(1):"--";
  return(
    <div style={{padding:"20px 16px 100px"}} className="fade-up">
      {/* Header */}
      <div style={{marginBottom:20}}>
        <div className="cormorant" style={{fontSize:12,color:"var(--muted)",letterSpacing:".12em",textTransform:"uppercase"}}>身心靈追蹤平台</div>
        <h1 className="cormorant" style={{fontSize:30,color:"var(--ink)",fontWeight:600,lineHeight:1.2,marginTop:4}}>
          {data.profile.name?`你好，${data.profile.name}`:"我的健康日誌"}
        </h1>
        <div style={{fontSize:13,color:"var(--muted)",marginTop:4}}>
          {new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"long",day:"numeric",weekday:"long"})}
        </div>
      </div>

      <WarningBanner insights={insights} profile={data.profile}/>

      {/* Today card */}
      <div className="glass" style={{padding:"18px 20px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <label>今日心情</label>
            {today?(
              <div style={{display:"flex",alignItems:"center",gap:10,marginTop:4}}>
                <span style={{fontSize:36}}>{moodLevel(today.moodScore).emoji}</span>
                <div>
                  <div style={{fontSize:24,fontWeight:600,color:moodLevel(today.moodScore).color}}>{today.moodScore}/10</div>
                  <div style={{fontSize:13,color:"var(--muted)"}}>{moodLevel(today.moodScore).label}</div>
                </div>
              </div>
            ):<div style={{color:"var(--muted)",fontSize:14,marginTop:8}}>今天尚未記錄</div>}
          </div>
          <button onClick={()=>setView("tracker")} style={{background:"linear-gradient(135deg,var(--sage),var(--sage-dark))",border:"none",borderRadius:14,padding:"12px 18px",color:"white",fontSize:14,cursor:"pointer",fontFamily:"DM Sans"}}>
            {today?"更新":"+ 記錄"}
          </button>
        </div>
        {today?.emotionTags?.length>0&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:10}}>
            {today.emotionTags.map(t=>(
              <span key={t} style={{background:"var(--sage-light)",color:"var(--sage-dark)",borderRadius:100,padding:"3px 12px",fontSize:12}}>{t}</span>
            ))}
          </div>
        )}
      </div>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        {[{label:"總記錄",value:data.entries.length,unit:"天"},{label:"本週均分",value:weekAvg,unit:""},{label:"整體均分",value:avg,unit:""}].map(s=>(
          <div key={s.label} className="glass" style={{padding:"12px 10px",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:600,color:"var(--sage-dark)"}}>{s.value}</div>
            <div style={{fontSize:10,color:"var(--muted)",marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Charts */}
      {data.entries.length>=2&&(
        <div className="glass" style={{padding:16,marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:500,color:"var(--ink)",marginBottom:10}}>📈 30日心情趨勢</div>
          <TrendChart entries={data.entries}/>
        </div>
      )}
      {insights?.freq&&Object.keys(insights.freq).length>0&&(
        <div className="glass" style={{padding:16,marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:500,color:"var(--ink)",marginBottom:6}}>🎯 影響因子分析</div>
          <ImpactPie freq={insights.freq}/>
        </div>
      )}

      {/* Recent */}
      {sorted.length>0&&(
        <div className="glass" style={{padding:16}}>
          <div style={{fontSize:13,fontWeight:500,color:"var(--ink)",marginBottom:10}}>🗓 最近紀錄</div>
          {sorted.slice(0,5).map(e=>(
            <div key={e.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid var(--border)"}}>
              <span style={{fontSize:22}}>{moodLevel(e.moodScore).emoji}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,color:"var(--ink)",fontWeight:500}}>
                  {new Date(e.timestamp).toLocaleDateString("zh-TW",{month:"numeric",day:"numeric",weekday:"short"})}
                </div>
                <div style={{fontSize:12,color:"var(--muted)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                  {e.notes||(e.emotionTags?.join("、")||"無備注")}
                </div>
              </div>
              <div style={{fontSize:16,fontWeight:600,color:moodLevel(e.moodScore).color,minWidth:30,textAlign:"right"}}>{e.moodScore}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   TRACKER VIEW
═══════════════════════════════════════════ */
function TrackerView({onSave}){
  const [step,setStep]=useState(0);
  const [moodScore,setMoodScore]=useState(5);
  const [emotionTags,setEmotionTags]=useState([]);
  const [selectedFactors,setSelectedFactors]=useState([]);
  const [activeCategory,setActiveCategory]=useState(null);
  const [notes,setNotes]=useState("");
  const [saved,setSaved]=useState(false);

  const toggleTag=t=>setEmotionTags(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t]);
  const toggleFactor=(cat,sub)=>{
    const has=selectedFactors.some(f=>f.category===cat&&f.detail===sub);
    if(has)setSelectedFactors(p=>p.filter(f=>!(f.category===cat&&f.detail===sub)));
    else setSelectedFactors(p=>[...p,{category:cat,detail:sub}]);
  };
  const handleSave=()=>{
    onSave({id:`entry_${Date.now()}`,timestamp:new Date().toISOString(),moodScore,emotionTags,impactFactors:selectedFactors,notes});
    setSaved(true);
  };
  const reset=()=>{setSaved(false);setStep(0);setMoodScore(5);setEmotionTags([]);setSelectedFactors([]);setNotes("");};

  const ml=moodLevel(moodScore);
  const stepLabels=["心情","情緒","因子","筆記"];

  if(saved)return(
    <div style={{padding:24,paddingBottom:100,textAlign:"center"}} className="fade-up">
      <div style={{fontSize:72,marginBottom:16}}>{moodLevel(moodScore).emoji}</div>
      <div className="cormorant" style={{fontSize:28,color:"var(--ink)",marginBottom:8}}>已記錄完成 ✨</div>
      <div style={{fontSize:14,color:"var(--muted)",marginBottom:28}}>感謝你今天的覺察與記錄 🌿</div>
      <button className="btn-primary" onClick={reset}>再次記錄</button>
    </div>
  );

  return(
    <div style={{padding:"20px 16px 100px"}} className="fade-up">
      <div className="cormorant" style={{fontSize:28,color:"var(--ink)",marginBottom:2}}>今日記錄</div>
      <div style={{fontSize:13,color:"var(--muted)",marginBottom:20}}>
        {new Date().toLocaleDateString("zh-TW",{month:"long",day:"numeric",weekday:"long"})}
      </div>

      {/* Progress bar */}
      <div style={{display:"flex",gap:4,marginBottom:24}}>
        {stepLabels.map((s,i)=>(
          <div key={i} style={{flex:1}}>
            <div style={{height:4,borderRadius:4,background:i<=step?"var(--sage)":"var(--parchment)",transition:"background .3s"}}/>
            <div style={{fontSize:10,color:i===step?"var(--sage-dark)":"var(--muted)",marginTop:4,textAlign:"center"}}>{s}</div>
          </div>
        ))}
      </div>

      {/* Step 0 – Mood */}
      {step===0&&(
        <div className="fade-up">
          <div style={{textAlign:"center",marginBottom:28}}>
            <div style={{fontSize:64,marginBottom:4}}>{ml.emoji}</div>
            <div className="cormorant" style={{fontSize:52,fontWeight:600,color:ml.color,lineHeight:1}}>{moodScore}</div>
            <div style={{fontSize:13,color:"var(--muted)"}}>/ 10</div>
          </div>
          <input type="range" min={1} max={10} value={moodScore}
            onChange={e=>setMoodScore(Number(e.target.value))}
            style={{width:"100%",marginBottom:12,background:`linear-gradient(to right,${ml.color} ${(moodScore-1)/9*100}%,#EDE3D4 ${(moodScore-1)/9*100}%)`}}
          />
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:24,fontSize:12,color:"var(--muted)"}}>
            <span>🌧 Low</span><span>🌤 Normal</span><span>☀️ Great</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:20}}>
            {[{label:"😔 低落",s:2},{label:"😌 普通",s:5},{label:"😄 很好",s:8}].map(({label,s})=>(
              <button key={s} onClick={()=>setMoodScore(s)} style={{
                padding:"14px 4px",borderRadius:14,border:`2px solid ${moodLevel(s).color}`,
                background:moodScore===s?moodLevel(s).color:"transparent",
                color:moodScore===s?"white":moodLevel(s).color,
                cursor:"pointer",fontSize:14,fontFamily:"DM Sans",fontWeight:500,transition:"all .2s"
              }}>{label}</button>
            ))}
          </div>
          <button className="btn-primary" onClick={()=>setStep(1)}>下一步 →</button>
        </div>
      )}

      {/* Step 1 – Tags */}
      {step===1&&(
        <div className="fade-up">
          <div style={{marginBottom:14,color:"var(--muted)",fontSize:14}}>選擇今天的情緒標籤（可多選）</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:24}}>
            {EMOTION_TAGS.map(t=>{
              const sel=emotionTags.includes(t);
              return(
                <button key={t} onClick={()=>toggleTag(t)} style={{
                  padding:"8px 16px",borderRadius:100,border:`1.5px solid ${sel?"var(--sage)":"var(--border)"}`,
                  background:sel?"var(--sage)":"transparent",color:sel?"white":"var(--ink)",
                  fontSize:14,cursor:"pointer",fontFamily:"DM Sans",transition:"all .2s"
                }}>{t}</button>
              );
            })}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn-ghost" onClick={()=>setStep(0)} style={{padding:"14px 20px"}}>← 返回</button>
            <button className="btn-primary" onClick={()=>setStep(2)}>下一步 →</button>
          </div>
        </div>
      )}

      {/* Step 2 – Impact */}
      {step===2&&(
        <div className="fade-up">
          <div style={{marginBottom:12,color:"var(--muted)",fontSize:14}}>什麼影響了你的心情？</div>
          <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:6,marginBottom:12}} className="scroll-hide">
            {Object.entries(IMPACT_CATEGORIES).map(([key,cat])=>(
              <button key={key} onClick={()=>setActiveCategory(activeCategory===key?null:key)} style={{
                padding:"10px 16px",borderRadius:100,border:"1.5px solid",
                borderColor:activeCategory===key?cat.color:"var(--border)",
                background:activeCategory===key?cat.color:"transparent",
                color:activeCategory===key?"white":"var(--ink)",
                fontSize:14,cursor:"pointer",fontFamily:"DM Sans",whiteSpace:"nowrap",transition:"all .2s"
              }}>{cat.icon} {cat.label}</button>
            ))}
          </div>
          {activeCategory&&(
            <div className="glass" style={{padding:14,marginBottom:12}}>
              <div style={{fontSize:12,color:"var(--muted)",marginBottom:8}}>細項：</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {IMPACT_CATEGORIES[activeCategory].sub.map(s=>{
                  const sel=selectedFactors.some(f=>f.category===activeCategory&&f.detail===s);
                  const col=IMPACT_CATEGORIES[activeCategory].color;
                  return(
                    <button key={s} onClick={()=>toggleFactor(activeCategory,s)} style={{
                      padding:"8px 16px",borderRadius:100,border:`1.5px solid ${sel?col:"var(--border)"}`,
                      background:sel?col:"transparent",color:sel?"white":"var(--ink)",
                      fontSize:13,cursor:"pointer",fontFamily:"DM Sans",transition:"all .2s"
                    }}>{s}</button>
                  );
                })}
              </div>
            </div>
          )}
          {selectedFactors.length>0&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
              {selectedFactors.map(f=>(
                <span key={`${f.category}-${f.detail}`} style={{
                  background:IMPACT_CATEGORIES[f.category]?.color+"22",
                  color:IMPACT_CATEGORIES[f.category]?.color,
                  border:`1px solid ${IMPACT_CATEGORIES[f.category]?.color}44`,
                  borderRadius:100,padding:"4px 12px",fontSize:12
                }}>{IMPACT_CATEGORIES[f.category]?.icon} {f.detail}</span>
              ))}
            </div>
          )}
          <div style={{display:"flex",gap:8}}>
            <button className="btn-ghost" onClick={()=>setStep(1)} style={{padding:"14px 20px"}}>← 返回</button>
            <button className="btn-primary" onClick={()=>setStep(3)}>下一步 →</button>
          </div>
        </div>
      )}

      {/* Step 3 – Notes */}
      {step===3&&(
        <div className="fade-up">
          <div style={{marginBottom:10,color:"var(--muted)",fontSize:14}}>今天有什麼想記錄的嗎？</div>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)}
            placeholder={"在這裡自由書寫...\n今天發生了什麼？有什麼感受？"}
            rows={6} style={{resize:"none",lineHeight:1.7,marginBottom:14}}/>
          <div style={{display:"flex",gap:8,marginBottom:0}}>
            <button className="btn-ghost" onClick={()=>setStep(2)} style={{padding:"14px 20px"}}>← 返回</button>
            <button className="btn-primary" onClick={handleSave}>💾 儲存今日記錄</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   INSIGHTS VIEW
═══════════════════════════════════════════ */
function InsightsView({data}){
  const insights=computeInsights(data.entries,data.profile);
  const sorted=[...data.entries].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  if(!data.entries.length)return(
    <div style={{padding:24,textAlign:"center",paddingTop:60}}>
      <div style={{fontSize:48,marginBottom:12}}>🔍</div>
      <div className="cormorant" style={{fontSize:22,color:"var(--ink)"}}>尚無足夠資料</div>
      <div style={{fontSize:13,color:"var(--muted)",marginTop:8}}>記錄幾天後，洞察功能將自動啟動</div>
    </div>
  );
  const best=sorted.reduce((a,b)=>a.moodScore>b.moodScore?a:b,sorted[0]);
  const worst=sorted.reduce((a,b)=>a.moodScore<b.moodScore?a:b,sorted[0]);
  return(
    <div style={{padding:"20px 16px 100px"}} className="fade-up">
      <div className="cormorant" style={{fontSize:28,color:"var(--ink)",marginBottom:2}}>智慧洞察</div>
      <div style={{fontSize:13,color:"var(--muted)",marginBottom:20}}>你的心情模式與建議</div>
      <WarningBanner insights={insights} profile={data.profile}/>

      {/* Decision Status */}
      <div className="glass" style={{padding:18,marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:600,color:"var(--ink)",marginBottom:12}}>🧭 決策狀態指標</div>
        {[
          {label:"近3天平均",value:insights?.last3?.length?(insights.last3.reduce((s,e)=>s+e.moodScore,0)/insights.last3.length).toFixed(1):"--"},
          {label:"建議決策",value:insights?.allLow?"⚠️ 暫緩":"✅ 可行"},
          {label:"人類圖策略",value:data.profile.hdStrategy||"未設定"},
          {label:"內在權威",value:data.profile.hdAuthority||"未設定"},
        ].map(item=>(
          <div key={item.label} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid var(--border)"}}>
            <span style={{fontSize:13,color:"var(--muted)"}}>{item.label}</span>
            <span style={{fontSize:13,fontWeight:600,color:"var(--ink)"}}>{item.value}</span>
          </div>
        ))}
      </div>

      {/* Best / Worst */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        <div className="glass" style={{padding:16}}>
          <div style={{fontSize:11,color:"var(--muted)",marginBottom:6}}>🏆 最佳一天</div>
          <div style={{fontSize:28}}>{moodLevel(best.moodScore).emoji}</div>
          <div style={{fontSize:20,fontWeight:700,color:"var(--sage)"}}>{best.moodScore}/10</div>
          <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{new Date(best.timestamp).toLocaleDateString("zh-TW",{month:"numeric",day:"numeric"})}</div>
        </div>
        <div className="glass" style={{padding:16}}>
          <div style={{fontSize:11,color:"var(--muted)",marginBottom:6}}>💤 最低一天</div>
          <div style={{fontSize:28}}>{moodLevel(worst.moodScore).emoji}</div>
          <div style={{fontSize:20,fontWeight:700,color:"var(--rose)"}}>{worst.moodScore}/10</div>
          <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{new Date(worst.timestamp).toLocaleDateString("zh-TW",{month:"numeric",day:"numeric"})}</div>
        </div>
      </div>

      {/* Impact ranking */}
      {insights?.freq&&(
        <div className="glass" style={{padding:18,marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:600,color:"var(--ink)",marginBottom:12}}>🎯 影響因子排行</div>
          {Object.entries(insights.freq).sort(([,a],[,b])=>b.count-a.count).map(([cat,val])=>(
            <div key={cat} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:13,color:"var(--ink)"}}>{IMPACT_CATEGORIES[cat]?.icon} {IMPACT_CATEGORIES[cat]?.label}</span>
                <span style={{fontSize:13,color:"var(--muted)"}}>{val.count} 次</span>
              </div>
              <div style={{height:6,background:"var(--parchment)",borderRadius:3,overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:3,background:IMPACT_CATEGORIES[cat]?.color,width:`${(val.count/data.entries.length*100).toFixed(0)}%`,transition:"width 1s"}}/>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:5}}>
                {Object.entries(val.subs).sort(([,a],[,b])=>b-a).slice(0,3).map(([sub,cnt])=>(
                  <span key={sub} style={{fontSize:11,color:"var(--muted)",background:"var(--parchment)",borderRadius:100,padding:"2px 10px"}}>{sub}({cnt})</span>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      <div className="glass" style={{padding:16,border:"1.5px dashed var(--sage-light)"}}>
        <div style={{fontSize:13,fontWeight:600,color:"var(--sage-dark)",marginBottom:6}}>🤖 AI 分析接口（未來擴充）</div>
        <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.7}}>
          ・情緒日誌自動標籤化<br/>
          ・心情與天氣關聯分析<br/>
          ・紫微主星與心情週期對比<br/>
          ・人類圖「非自己主題」識別
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   PROFILE VIEW
═══════════════════════════════════════════ */
function ProfileView({data,onUpdate,onExport}){
  const [form,setForm]=useState({...data.profile});
  const [saved,setSaved]=useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const handleSave=()=>{onUpdate(form);setSaved(true);setTimeout(()=>setSaved(false),2500);};
  return(
    <div style={{padding:"20px 16px 100px"}} className="fade-up">
      <div className="cormorant" style={{fontSize:28,color:"var(--ink)",marginBottom:2}}>個人設定</div>
      <div style={{fontSize:13,color:"var(--muted)",marginBottom:20}}>基本資料與星盤設定</div>

      <div className="glass" style={{padding:18,marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:600,color:"var(--ink)",marginBottom:14}}>👤 基本資料</div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div><label>名稱</label><input value={form.name} onChange={e=>set("name",e.target.value)} placeholder="你的名字"/></div>
          <div><label>生日</label><input type="date" value={form.birthday} onChange={e=>set("birthday",e.target.value)}/></div>
          <div><label>出生時間</label><input type="time" value={form.birthTime} onChange={e=>set("birthTime",e.target.value)}/></div>
        </div>
      </div>

      <div className="glass" style={{padding:18,marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:600,color:"var(--lavender)",marginBottom:2}}>🌌 人類圖 (Human Design)</div>
        <div style={{fontSize:12,color:"var(--muted)",marginBottom:14}}>根據出生資料的能量藍圖</div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div><label>類型 (Type)</label>
            <select value={form.hdType} onChange={e=>set("hdType",e.target.value)}>
              <option value="">選擇類型</option>
              {HD_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
          </div>
          <div><label>策略 (Strategy)</label>
            <select value={form.hdStrategy} onChange={e=>set("hdStrategy",e.target.value)}>
              <option value="">選擇策略</option>
              {HD_STRATEGIES.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <div><label>內在權威 (Authority)</label>
            <select value={form.hdAuthority} onChange={e=>set("hdAuthority",e.target.value)}>
              <option value="">選擇權威</option>
              {HD_AUTHORITIES.map(a=><option key={a} value={a}>{a}</option>)}
            </select>
          </div>
        </div>
        {form.hdType&&(
          <div style={{marginTop:12,padding:"10px 14px",background:"rgba(140,127,168,.1)",borderRadius:12,fontSize:13,color:"var(--lavender)",lineHeight:1.6}}>
            <b>策略：</b>{form.hdStrategy||"未選"} · <b>權威：</b>{form.hdAuthority||"未選"}
          </div>
        )}
      </div>

      <div className="glass" style={{padding:18,marginBottom:16}}>
        <div style={{fontSize:14,fontWeight:600,color:"var(--amber)",marginBottom:2}}>⭐ 紫微斗數</div>
        <div style={{fontSize:12,color:"var(--muted)",marginBottom:14}}>命宮主星</div>
        <select value={form.ziWeiStar} onChange={e=>set("ziWeiStar",e.target.value)}>
          <option value="">選擇主星</option>
          {ZIWEI_STARS.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        {form.ziWeiStar&&(
          <div style={{marginTop:10,padding:"8px 12px",background:"rgba(200,154,80,.1)",borderRadius:12,fontSize:13,color:"var(--amber)"}}>
            ✦ {form.ziWeiStar}星 — 對照資料預留接入點
          </div>
        )}
      </div>

      <button className="btn-primary" onClick={handleSave} style={{marginBottom:10}}>
        {saved?"✓ 已儲存！":"儲存設定"}
      </button>
      <button onClick={onExport} className="btn-ghost" style={{width:"100%",textAlign:"center",padding:"14px",display:"block"}}>
        📤 匯出所有資料（JSON 備份）
      </button>
    </div>
  );
}

/* ═══════════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════════ */
function BottomNav({view,setView}){
  const tabs=[{key:"home",icon:"🏡",label:"首頁"},{key:"tracker",icon:"✍️",label:"記錄"},{key:"insights",icon:"💡",label:"洞察"},{key:"profile",icon:"🌿",label:"設定"}];
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,maxWidth:480,margin:"0 auto",
      background:"rgba(245,239,230,0.94)",backdropFilter:"blur(16px)",
      borderTop:"1px solid var(--border)",padding:"8px 0 env(safe-area-inset-bottom,20px)",
      display:"flex",zIndex:100}}>
      {tabs.map(t=>(
        <button key={t.key} onClick={()=>setView(t.key)} style={{
          flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,
          background:"none",border:"none",cursor:"pointer",padding:"6px 0",
          opacity:view===t.key?1:0.4,transition:"all .2s",
          transform:view===t.key?"scale(1.1)":"scale(1)"
        }}>
          <span style={{fontSize:22}}>{t.icon}</span>
          <span style={{fontSize:10,fontFamily:"DM Sans",color:view===t.key?"var(--sage-dark)":"var(--muted)",fontWeight:view===t.key?500:400}}>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════ */
function App(){
  const [data,setData]=useState(()=>seedDemo(loadData()));
  const [view,setView]=useState("home");
  useEffect(()=>saveData(data),[data]);
  const saveEntry=useCallback(entry=>{
    setData(prev=>{
      const filtered=prev.entries.filter(e=>new Date(e.timestamp).toDateString()!==new Date(entry.timestamp).toDateString());
      return{...prev,entries:[...filtered,entry]};
    });
  },[]);
  const updateProfile=useCallback(profile=>setData(p=>({...p,profile})),[]);
  const exportData=()=>{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;
    a.download=`wellness_${new Date().toISOString().split("T")[0]}.json`;
    a.click();URL.revokeObjectURL(url);
  };
  return(
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",
      background:"linear-gradient(160deg,#F5EFE6 0%,#EDE3D4 60%,#E8DDD0 100%)",
      position:"relative",overflowX:"hidden"}}>
      <div style={{position:"fixed",top:-50,right:-50,width:180,height:180,borderRadius:"50%",background:"rgba(122,158,126,.1)",zIndex:0,pointerEvents:"none"}}/>
      <div style={{position:"fixed",bottom:80,left:-30,width:140,height:140,borderRadius:"50%",background:"rgba(192,128,112,.08)",zIndex:0,pointerEvents:"none"}}/>
      <div style={{position:"relative",zIndex:1}}>
        {view==="home"&&<HomeView data={data} setView={setView}/>}
        {view==="tracker"&&<TrackerView data={data} onSave={saveEntry}/>}
        {view==="insights"&&<InsightsView data={data}/>}
        {view==="profile"&&<ProfileView data={data} onUpdate={updateProfile} onExport={exportData}/>}
      </div>
      <BottomNav view={view} setView={setView}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
