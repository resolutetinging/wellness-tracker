<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>身心靈健康追蹤</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#ECEAE8;--bg2:#E2E0DC;--bg3:#D6D3CE;
  --card:rgba(252,251,250,0.88);
  --border:rgba(148,142,136,0.2);
  --shadow:0 2px 20px rgba(40,35,30,0.07);
  --ink:#242220;--ink2:#4A4744;--muted:#7A7470;--faint:#A8A4A0;
  --pr:#536070;--pr-d:#364555;--pr-l:#8898A8;--pr-bg:rgba(83,96,112,0.1);
  --low:#A07068;--norm:#8A7848;--great:#588068;
  --lavender:#7870A0;--lav-bg:rgba(120,112,160,0.1);
  --amber:#907840;--amb-bg:rgba(144,120,64,0.1);
  --rose:#A07070;--rose-bg:rgba(160,112,112,0.1);
}
html,body{height:100%;background:var(--bg);}
body{font-family:'DM Sans',sans-serif;color:var(--ink);overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
.serif{font-family:'Cormorant Garamond',serif;}
#app{max-width:480px;margin:0 auto;min-height:100vh;
  background:linear-gradient(168deg,#ECEAE8 0%,#E4E1DC 50%,#DAD7D1 100%);
  position:relative;overflow-x:hidden;}
.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
.b1{top:-60px;right:-60px;width:200px;height:200px;background:rgba(83,96,112,.06);}
.b2{bottom:90px;left:-40px;width:150px;height:150px;background:rgba(160,112,104,.05);}
.view{display:none;padding:20px 16px 112px;position:relative;z-index:1;}
.view.active{display:block;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.glass{background:var(--card);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);}
.card-p{padding:18px;}
.btn{display:block;width:100%;padding:14px 20px;border-radius:13px;border:none;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all .18s;text-align:center;}
.btn-pr{background:linear-gradient(135deg,var(--pr),var(--pr-d));color:#fff;}
.btn-pr:active{opacity:.9;}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted);}
.btn-ghost:active{background:var(--bg2);}
.btn-sm{display:inline-block;width:auto;padding:9px 16px;font-size:14px;}
.btn-danger{background:rgba(160,90,80,.07);border:1.5px solid rgba(160,90,80,.22);color:#9A5048;
  border-radius:13px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;
  padding:12px 18px;width:100%;text-align:center;transition:all .2s;display:block;}
.btn-danger:active{background:rgba(160,90,80,.13);}
.field-label{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.06em;
  text-transform:uppercase;display:block;margin-bottom:6px;}
input,textarea,select{font-family:'DM Sans',sans-serif;background:var(--bg2);
  border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;font-size:15px;
  color:var(--ink);width:100%;outline:none;transition:border-color .2s;appearance:none;}
input:focus,textarea:focus,select:focus{border-color:var(--pr);}
textarea{resize:none;line-height:1.7;}
input[type=range]{height:7px;border-radius:4px;background:var(--bg3);padding:0;border:none;
  cursor:pointer;-webkit-appearance:none;appearance:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;
  border-radius:50%;background:#fff;border:2.5px solid var(--pr);box-shadow:0 2px 8px rgba(0,0,0,.12);cursor:pointer;}
input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;
  background:#fff;border:2.5px solid var(--pr);box-shadow:0 2px 8px rgba(0,0,0,.12);}
.chip{display:inline-block;padding:7px 15px;border-radius:100px;font-size:13px;
  cursor:pointer;transition:all .18s;border:1.5px solid var(--border);
  font-family:'DM Sans',sans-serif;background:transparent;color:var(--ink2);}
.chip.sel{background:var(--pr);color:#fff;border-color:var(--pr);}
.chip-wrap{display:flex;flex-wrap:wrap;gap:7px;}
.prog-row{display:flex;gap:5px;margin-bottom:22px;}
.seg{flex:1;}
.bar{height:3px;border-radius:3px;background:var(--bg3);transition:background .3s;}
.bar.done{background:var(--pr);}
.seg-lbl{font-size:10px;color:var(--faint);margin-top:4px;text-align:center;}
.seg-lbl.active{color:var(--pr);font-weight:500;}
#nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;
  background:rgba(236,234,232,.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--border);display:flex;z-index:200;
  padding-bottom:env(safe-area-inset-bottom,14px);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;padding:9px 0;transition:all .2s;opacity:.38;}
.nb.active{opacity:1;transform:scale(1.07);}
.nb .ni{font-size:21px;}
.nb .nl{font-size:10px;font-family:'DM Sans',sans-serif;color:var(--muted);}
.nb.active .nl{color:var(--pr-d);font-weight:500;}
.row{display:flex;gap:8px;}
.row .btn{flex:1;}
.col{display:flex;flex-direction:column;gap:11px;}
.sb{display:flex;justify-content:space-between;align-items:center;}
.mb8{margin-bottom:8px;}.mb12{margin-bottom:12px;}.mb16{margin-bottom:16px;}.mb20{margin-bottom:20px;}
.scroll-h{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.scroll-h::-webkit-scrollbar{display:none;}
.pill{display:inline-block;padding:3px 12px;border-radius:100px;font-size:12px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.sec-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:12px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-card{padding:12px 10px;text-align:center;}
.stat-v{font-size:22px;font-weight:600;color:var(--pr-d);}
.stat-l{font-size:10px;color:var(--muted);margin-top:2px;}
.e-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.e-row:last-child{border-bottom:none;}
.e-info{flex:1;min-width:0;}
.e-date{font-size:13px;font-weight:500;color:var(--ink);}
.e-note{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.e-del{background:none;border:none;cursor:pointer;color:var(--faint);font-size:15px;padding:4px 6px;flex-shrink:0;border-radius:6px;}
.e-del:hover{color:var(--rose);background:var(--rose-bg);}
.person-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.person-row:last-child{border-bottom:none;}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--faint);font-size:16px;padding:4px 6px;border-radius:6px;}
.icon-btn:hover{color:var(--rose);background:var(--rose-bg);}
.cat-form{background:var(--bg2);border:1.5px dashed var(--border);border-radius:14px;padding:14px;margin-top:10px;}
.color-dots{display:flex;gap:8px;margin-top:6px;}
.color-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .2s;}
.color-dot.sel{border-color:var(--ink2);}
.warn{background:rgba(160,100,88,.08);border:1.5px solid rgba(160,100,88,.26);
  border-radius:15px;padding:13px 15px;margin-bottom:13px;display:flex;gap:10px;}
.hint-box{margin-top:10px;padding:10px 13px;border-radius:11px;font-size:13px;line-height:1.6;}
.bar-bg{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:5px;}
.bar-fill{height:100%;border-radius:3px;transition:width 1.2s;}
.tag-pill{font-size:11px;color:var(--muted);background:var(--bg3);border-radius:100px;padding:2px 10px;}
.sub-tags{display:flex;flex-wrap:wrap;gap:4px;}
.saved-screen{text-align:center;padding:50px 24px 100px;}
.dashed{border:1.5px dashed rgba(83,96,112,.28) !important;}
</style>
</head>
<body>
<div id="app">
  <div class="blob b1"></div><div class="blob b2"></div>

  <!-- HOME -->
  <div id="view-home" class="view active">
    <div class="mb20">
      <div class="serif" style="font-size:12px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;">身心靈追蹤平台</div>
      <h1 id="home-title" class="serif" style="font-size:30px;font-weight:600;line-height:1.2;margin-top:4px;"></h1>
      <div id="home-date" style="font-size:13px;color:var(--muted);margin-top:3px;"></div>
    </div>
    <div id="home-warn"></div>
    <div id="home-today" class="glass card-p mb12"></div>
    <div id="home-stats" class="stat-grid"></div>
    <div id="home-trend" class="glass mb12" style="padding:16px;display:none;">
      <div class="sec-title">📈 30日心情趨勢</div>
      <canvas id="chart-trend" height="155"></canvas>
    </div>
    <div id="home-pie" class="glass mb12" style="padding:16px;display:none;">
      <div class="sb mb8">
        <div class="sec-title" style="margin-bottom:0;">🎯 影響因子分析</div>
        <div id="pie-hint" style="font-size:12px;color:var(--muted);"></div>
      </div>
      <canvas id="chart-pie" height="195"></canvas>
    </div>
    <div id="home-recent" class="glass card-p" style="display:none;">
      <div class="sec-title">🗓 最近紀錄</div>
      <div id="recent-list"></div>
    </div>
  </div>

  <!-- TRACKER -->
  <div id="view-tracker" class="view">
    <div class="serif mb4" style="font-size:28px;font-weight:600;color:var(--ink);">今日記錄</div>
    <div id="t-date" class="mb20" style="font-size:13px;color:var(--muted);"></div>
    <div class="prog-row">
      <div class="seg"><div class="bar done" id="b0"></div><div class="seg-lbl active" id="l0">心情</div></div>
      <div class="seg"><div class="bar" id="b1"></div><div class="seg-lbl" id="l1">情緒</div></div>
      <div class="seg"><div class="bar" id="b2"></div><div class="seg-lbl" id="l2">因子</div></div>
      <div class="seg"><div class="bar" id="b3"></div><div class="seg-lbl" id="l3">筆記</div></div>
    </div>
    <div id="s0">
      <div style="text-align:center;margin-bottom:26px;">
        <div id="s-emoji" style="font-size:60px;margin-bottom:4px;">🌤</div>
        <div id="s-num" class="serif" style="font-size:52px;font-weight:600;line-height:1;color:var(--norm);">5</div>
        <div style="font-size:13px;color:var(--muted);">/ 10</div>
      </div>
      <input type="range" id="slider" min="1" max="10" value="5" style="width:100%;margin-bottom:10px;"/>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:20px;">
        <span>🌧 Low</span><span>🌤 Normal</span><span>☀️ Great</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px;" id="quick-btns"></div>
      <button class="btn btn-pr" onclick="goStep(1)">下一步 →</button>
    </div>
    <div id="s1" style="display:none;">
      <div style="font-size:14px;color:var(--muted);margin-bottom:13px;">選擇今天的情緒標籤（可多選）</div>
      <div class="chip-wrap mb20" id="emotion-chips"></div>
      <div class="row">
        <button class="btn btn-ghost btn-sm" onclick="goStep(0)">← 返回</button>
        <button class="btn btn-pr" onclick="goStep(2)">下一步 →</button>
      </div>
    </div>
    <div id="s2" style="display:none;">
      <div style="font-size:14px;color:var(--muted);margin-bottom:11px;">什麼影響了你的心情？</div>
      <div class="scroll-h mb12" id="cat-row"></div>
      <div id="sub-panel" style="display:none;" class="glass card-p mb12">
        <div id="sub-label" style="font-size:12px;color:var(--muted);margin-bottom:10px;"></div>
        <div id="sub-content"></div>
      </div>
      <div id="sel-factors" class="chip-wrap mb12"></div>
      <div id="cat-form" style="display:none;" class="cat-form">
        <div style="font-size:13px;font-weight:500;color:var(--ink);margin-bottom:10px;">新增自訂類別</div>
        <div class="col mb12">
          <div><label class="field-label">圖示（任意 emoji）</label><input id="new-cat-icon" placeholder="🏃 🎵 🧘 ✈️" maxlength="4" style="width:100px;"/></div>
          <div><label class="field-label">類別名稱</label><input id="new-cat-name" placeholder="例：運動、冥想、旅行"/></div>
          <div><label class="field-label">顏色</label><div class="color-dots" id="color-dots"></div></div>
        </div>
        <div class="row">
          <button class="btn btn-ghost btn-sm" onclick="closeCatForm()">取消</button>
          <button class="btn btn-pr btn-sm" onclick="addCustomCat()">新增</button>
        </div>
      </div>
      <div class="row">
        <button class="btn btn-ghost btn-sm" onclick="goStep(1)">← 返回</button>
        <button class="btn btn-pr" onclick="goStep(3)">下一步 →</button>
      </div>
    </div>
    <div id="s3" style="display:none;">
      <div style="font-size:14px;color:var(--muted);margin-bottom:10px;">今天有什麼想記錄的嗎？</div>
      <textarea id="notes" rows="6" placeholder="在這裡自由書寫...&#10;今天發生了什麼？有什麼感受？" style="margin-bottom:14px;"></textarea>
      <div class="row">
        <button class="btn btn-ghost btn-sm" onclick="goStep(2)">← 返回</button>
        <button class="btn btn-pr" onclick="saveEntry()">💾 儲存今日記錄</button>
      </div>
    </div>
    <div id="s-saved" style="display:none;" class="saved-screen">
      <div id="saved-e" style="font-size:68px;margin-bottom:14px;"></div>
      <div class="serif" style="font-size:28px;color:var(--ink);margin-bottom:8px;">已記錄完成 ✨</div>
      <div style="font-size:14px;color:var(--muted);margin-bottom:26px;">感謝你今天的覺察與記錄 🌿</div>
      <button class="btn btn-pr" onclick="resetTracker()">再次記錄</button>
    </div>
  </div>

  <!-- INSIGHTS -->
  <div id="view-insights" class="view">
    <div class="serif mb4" style="font-size:28px;font-weight:600;color:var(--ink);">智慧洞察</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:20px;">從你的記錄自動統整</div>
    <div id="ins-warn"></div>
    <div id="ins-body"></div>
  </div>

  <!-- PROFILE -->
  <div id="view-profile" class="view">
    <div class="serif mb4" style="font-size:28px;font-weight:600;color:var(--ink);">個人設定</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:20px;">基本資料、人際圈與星盤設定</div>
    <div class="glass card-p mb12">
      <div class="sec-title">👤 基本資料</div>
      <div class="col">
        <div><label class="field-label">名稱</label><input id="p-name" placeholder="你的名字"/></div>
        <div><label class="field-label">生日</label><input id="p-bday" type="date"/></div>
        <div><label class="field-label">出生時間</label><input id="p-btime" type="time"/></div>
      </div>
    </div>
    <div class="glass card-p mb12">
      <div class="sb mb12">
        <div class="sec-title" style="margin-bottom:0;color:var(--pr-d);">👥 我的人際圈</div>
        <button class="btn btn-pr btn-sm" style="padding:7px 14px;font-size:13px;" onclick="showAddPerson()">＋ 新增</button>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:11px;">名單會出現在記錄頁「朋友」選項中</div>
      <div id="people-list"></div>
      <div id="add-person-form" style="display:none;margin-top:11px;padding-top:11px;border-top:1px solid var(--border);">
        <label class="field-label">姓名 / 稱呼</label>
        <input id="new-person" placeholder="例：小明、媽媽、同事阿華" style="margin-bottom:10px;"/>
        <div class="row">
          <button class="btn btn-ghost btn-sm" onclick="hideAddPerson()">取消</button>
          <button class="btn btn-pr btn-sm" onclick="addPerson()">新增</button>
        </div>
      </div>
    </div>
    <div class="glass card-p mb12">
      <div class="sec-title" style="color:var(--lavender);">🌌 人類圖 (Human Design)</div>
      <div class="col">
        <div><label class="field-label">類型 (Type)</label>
          <select id="p-hdt" onchange="hdHint()"><option value="">選擇類型</option>
            <option>Generator</option><option>Manifesting Generator</option>
            <option>Projector</option><option>Manifestor</option><option>Reflector</option></select></div>
        <div><label class="field-label">策略 (Strategy)</label>
          <select id="p-hds" onchange="hdHint()"><option value="">選擇策略</option>
            <option>等待回應</option><option>等待邀請</option>
            <option>通知後行動</option><option>等待月相循環</option><option>等待滿足感</option></select></div>
        <div><label class="field-label">內在權威 (Authority)</label>
          <select id="p-hda" onchange="hdHint()"><option value="">選擇權威</option>
            <option>骶骨</option><option>情感</option><option>脾臟</option>
            <option>自我投射</option><option>心臟</option><option>意志力</option><option>無</option></select></div>
      </div>
      <div id="hd-hint" class="hint-box" style="display:none;background:var(--lav-bg);color:var(--lavender);"></div>
    </div>
    <div class="glass card-p mb16">
      <div class="sec-title" style="color:var(--amber);">⭐ 紫微斗數</div>
      <label class="field-label">命宮主星</label>
      <select id="p-zw" onchange="zwHint()"><option value="">選擇主星</option>
        <option>紫微</option><option>天機</option><option>太陽</option><option>武曲</option>
        <option>天同</option><option>廉貞</option><option>天府</option><option>太陰</option>
        <option>貪狼</option><option>巨門</option><option>天相</option><option>天梁</option>
        <option>七殺</option><option>破軍</option></select>
      <div id="zw-hint" class="hint-box" style="display:none;background:var(--amb-bg);color:var(--amber);"></div>
    </div>
    <button class="btn btn-pr mb12" id="save-btn" onclick="saveProfile()">儲存設定</button>
    <button class="btn btn-ghost mb16" onclick="exportData()">📤 匯出所有資料（JSON 備份）</button>
    <div class="glass card-p" style="border-color:rgba(160,90,80,.18);">
      <div class="sec-title" style="color:var(--rose);">🗑 資料管理</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:11px;">示範資料是第一次打開時自動產生的，可清除後重新開始。</div>
      <button class="btn-danger mb12" onclick="clearDemo()">清除示範資料（保留我的記錄）</button>
      <button class="btn-danger" style="color:#8A3828;" onclick="clearAll()">清除所有記錄（不可還原）</button>
    </div>
  </div>

  <nav id="nav">
    <button class="nb active" data-v="home" onclick="go('home')"><span class="ni">🏡</span><span class="nl">首頁</span></button>
    <button class="nb" data-v="tracker" onclick="go('tracker')"><span class="ni">✍️</span><span class="nl">記錄</span></button>
    <button class="nb" data-v="insights" onclick="go('insights')"><span class="ni">💡</span><span class="nl">洞察</span></button>
    <button class="nb" data-v="profile" onclick="go('profile')"><span class="ni">🌿</span><span class="nl">設定</span></button>
  </nav>
</div>
<script>
const KEY="wellness_v4";
const EMOTIONS=["平靜","喜悅","感恩","焦慮","疲憊","孤獨","充實","迷茫","愛","憤怒","希望","壓力"];
const DEFAULT_CATS={
  weather:{label:"天氣",icon:"🌤",color:"#8A7848",sub:["晴天","雨天","陰天","悶熱","涼爽"]},
  friends:{label:"朋友",icon:"👥",color:"#536070",sub:[]},
  health: {label:"健康",icon:"💚",color:"#588068",sub:["睡眠好","睡眠差","運動了","身體不適"]},
  work:   {label:"工作",icon:"💼",color:"#A07068",sub:["工作順利","壓力大","有成就感","無聊"]},
};
const CAT_COLORS=["#536070","#588068","#8A7848","#A07068","#7870A0","#686878"];
let DB=loadDB();
function loadDB(){try{return JSON.parse(localStorage.getItem(KEY))||freshDB();}catch{return freshDB();}}
function freshDB(){return{profile:{name:"",birthday:"",birthTime:"",hdType:"",hdStrategy:"",hdAuthority:"",ziWeiStar:"",people:[]},entries:[],customCats:[]};}
function persist(){localStorage.setItem(KEY,JSON.stringify(DB));}
if(!DB.profile.people)DB.profile.people=[];
if(!DB.customCats)DB.customCats=[];

/* seed */
(function(){
  if(DB.entries.length>0)return;
  const m=[4,6,3,7,5,8,2,6,7,4,5,3,8,6,5,7,4,6,8,5,3,7,6,4,5,8,7,6,5,4];
  const sm={weather:["晴天","雨天","陰天","悶熱"],friends:["朋友"],health:["睡眠好","睡眠差","運動了"],work:["工作順利","壓力大"]};
  const ck=Object.keys(DEFAULT_CATS);
  for(let i=29;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const cat=ck[i%4];
    DB.entries.push({id:"demo_"+i,isDemo:true,timestamp:d.toISOString(),moodScore:m[i]||5,
      emotionTags:[EMOTIONS[i%EMOTIONS.length],EMOTIONS[(i+3)%EMOTIONS.length]],
      impactFactors:[{category:cat,detail:sm[cat][i%sm[cat].length]}],notes:""});
  }
  persist();
})();

function moodInfo(s){
  if(s<=3)return{label:"Low",hex:"#A07068",emoji:"🌧"};
  if(s<=6)return{label:"Normal",hex:"#8A7848",emoji:"🌤"};
  return{label:"Great",hex:"#588068",emoji:"☀️"};
}

function go(v){
  document.querySelectorAll(".view").forEach(e=>e.classList.remove("active"));
  document.querySelectorAll(".nb").forEach(e=>e.classList.remove("active"));
  document.getElementById("view-"+v).classList.add("active");
  document.querySelector(`[data-v="${v}"]`).classList.add("active");
  if(v==="home")renderHome();
  if(v==="insights")renderInsights();
  if(v==="profile")loadProfile();
  window.scrollTo(0,0);
}

/* ── HOME ── */
let tChart=null,pChart=null;
function renderHome(){

      <div style="font-size:14px;color:var(--muted);margin-top:8px;">今天尚未記錄</div></div>
      <button class="btn btn-pr btn-sm" onclick="go('tracker')">+ 記錄</button></div>`;
  }
  const all=DB.entries;

  const wk=all.filter(e=>(new Date()-new Date(e.timestamp))/86400000<=7);

    `<div class="glass stat-card"><div class="stat-v">${all.length}</div><div class="stat-l">總記錄（天）</div></div>
     <div class="glass stat-card"><div class="stat-v">${wAvg}</div><div class="stat-l">本週均分</div></div>
     <div class="glass stat-card"><div class="stat-v">${avg}</div><div class="stat-l">整體均分</div></div>`;
  if(all.length>=2){
    document.getElementById("home-trend").style.display="block";
    const l30=[...all].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)).slice(-30);
    const labels=l30.map(e=>new Date(e.timestamp).toLocaleDateString("zh-TW",{month:"numeric",day:"numeric"}));
    const scores=l30.map(e=>e.moodScore);
    if(tChart)tChart.destroy();
    const ctx=document.getElementById("chart-trend").getContext("2d");
    const g=ctx.createLinearGradient(0,0,0,155);
    g.addColorStop(0,"rgba(83,96,112,.12)");g.addColorStop(1,"rgba(83,96,112,0)");
    tChart=new Chart(ctx,{type:"line",data:{labels,datasets:[{data:scores,borderColor:"#536070",borderWidth:2.5,
      pointBackgroundColor:scores.map(s=>moodInfo(s).hex),pointBorderColor:"#fff",pointBorderWidth:2,
      pointRadius:4,tension:.4,fill:true,backgroundColor:g}]},
      options:{responsive:true,plugins:{legend:{display:false},
        tooltip:{callbacks:{label:c=>`${c.raw} ${moodInfo(c.raw).emoji} ${moodInfo(c.raw).label}`},
          bodyColor:"#242220",backgroundColor:"rgba(252,251,250,.97)",borderColor:"rgba(148,142,136,.2)",borderWidth:1,cornerRadius:10}},
        scales:{y:{min:1,max:10,ticks:{color:"#7A7470",font:{size:10},stepSize:3},grid:{color:"rgba(148,142,136,.15)"}},
          x:{ticks:{color:"#7A7470",font:{size:10},maxTicksLimit:6},grid:{display:false}}}}});
  }
  const freq=computeFreq();
  if(Object.keys(freq).length>0){document.getElementById("home-pie").style.display="block";buildPie(freq,"main",null);}
  if(sorted.length>0){
    document.getElementById("home-recent").style.display="block";
    document.getElementById("recent-list").innerHTML=sorted.slice(0,8).map(e=>{
      const mi=moodInfo(e.moodScore);
      const demo=e.isDemo?`<span style="font-size:10px;color:var(--faint);margin-left:4px;">[示範]</span>`:"";
      return `<div class="e-row">
        <span style="font-size:20px;">${mi.emoji}</span>

          <div class="e-note">${e.notes||(e.emotionTags?.join("、")||"無備注")}</div>
        </div>
        <div style="font-size:15px;font-weight:600;color:${mi.hex};min-width:24px;text-align:right;">${e.moodScore}</div>
        <button class="e-del" onclick="delEntry('${e.id}')" title="刪除">✕</button>

}
function delEntry(id){
  if(!confirm("確定刪除這筆記錄？"))return;
  DB.entries=DB.entries.filter(e=>e.id!==id);persist();renderHome();
}
function computeFreq(){
  const freq={};const all={...DEFAULT_CATS};DB.customCats.forEach(c=>all[c.id]=c);
  DB.entries.forEach(e=>(e.impactFactors||[]).forEach(f=>{
    if(!freq[f.category])freq[f.category]={count:0,subs:{},color:all[f.category]?.color||"#888",label:all[f.category]?.label||f.category};
    freq[f.category].count++;
    if(f.detail)freq[f.category].subs[f.detail]=(freq[f.category].subs[f.detail]||0)+1;
  }));
  return freq;
}
function buildPie(freq,state,activeKey){
  if(pChart)pChart.destroy();
  const ctx=document.getElementById("chart-pie").getContext("2d");
  let labels,data,colors,hint;
  if(state==="main"){
    labels=Object.values(freq).map(v=>v.label);data=Object.values(freq).map(v=>v.count);
    colors=Object.values(freq).map(v=>v.color);hint="點擊扇形查看細項";
  } else {
    const subs=freq[activeKey].subs;labels=Object.keys(subs);data=Object.values(subs);
    const base=freq[activeKey].color;
    colors=labels.map((_,i)=>base+(Math.round(255*(0.35+i/Math.max(labels.length,1)*0.65)).toString(16).padStart(2,"0")));
    hint=`${freq[activeKey].label} · <span style="cursor:pointer;text-decoration:underline;" onclick="buildPie(window._freq,'main',null);document.getElementById('pie-hint').innerHTML='點擊扇形查看細項'">← 返回</span>`;
  }
  window._freq=freq;document.getElementById("pie-hint").innerHTML=hint;
  pChart=new Chart(ctx,{type:"pie",data:{labels,datasets:[{data,backgroundColor:colors,borderColor:"rgba(252,251,250,.9)",borderWidth:2}]},
    options:{responsive:true,plugins:{
      legend:{position:"bottom",labels:{font:{size:11},color:"#7A7470",boxWidth:9,padding:9}},
      tooltip:{callbacks:{label:c=>`${c.label}：${c.raw}次`},bodyColor:"#242220",backgroundColor:"rgba(252,251,250,.97)",borderColor:"rgba(148,142,136,.2)",borderWidth:1,cornerRadius:10}},
      onClick:(_,items)=>{if(state==="main"&&items.length>0){const k=Object.keys(freq)[items[0].index];if(Object.keys(freq[k]?.subs||{}).length>0)buildPie(freq,"sub",k);}}}});
}
function buildWarn(){
  const s=[...DB.entries].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).slice(0,3);
  if(s.length<3||!s.every(e=>e.moodScore<=3))return"";
  const hw=["Projector","Reflector"].includes(DB.profile.hdType);
  return`<div class="warn"><span style="font-size:20px;">⚠️</span><div>
    <div style="font-size:13px;font-weight:600;color:#9A5048;margin-bottom:3px;">決策警告</div>
    <div style="font-size:13px;color:var(--ink);line-height:1.6;">已連續 3 天心情低落。${hw?`根據人類圖類型（${DB.profile.hdType}），可能處於「非自己主題」，`:""} 建議暫緩重大決策。🌿</div>
  </div></div>`;
}

/* ── TRACKER ── */
let selEmotions=[],selFactors=[],activeCat=null,newCatColor=CAT_COLORS[0];
function initTracker(){
  document.getElementById("t-date").textContent=new Date().toLocaleDateString("zh-TW",{month:"long",day:"numeric",weekday:"long"});
  document.getElementById("emotion-chips").innerHTML=EMOTIONS.map(t=>`<button class="chip" id="ec-${t}" onclick="toggleEmo('${t}')">${t}</button>`).join("");
  document.getElementById("color-dots").innerHTML=CAT_COLORS.map((c,i)=>
    `<div class="color-dot${i===0?" sel":""}" style="background:${c};" onclick="pickColor(this,'${c}')"></div>`).join("");
  document.getElementById("quick-btns").innerHTML=[{l:"😔 低落",s:2},{l:"😌 普通",s:5},{l:"😄 很好",s:8}]
    .map(({l,s})=>`<button class="btn btn-ghost" onclick="quickM(${s})" style="font-size:14px;">${l}</button>`).join("");
  renderCatRow();updateSlider();
}
function renderCatRow(){
  const all={...DEFAULT_CATS};DB.customCats.forEach(c=>all[c.id]=c);
  let h=Object.entries(all).map(([k,c])=>`<button class="chip" id="cb-${k}" style="white-space:nowrap;" onclick="toggleCat('${k}')">${c.icon} ${c.label}</button>`).join("");
  h+=`<button class="chip" style="white-space:nowrap;border-style:dashed;" onclick="toggleCatForm()">＋ 新增類別</button>`;
  document.getElementById("cat-row").innerHTML=h;
  if(activeCat)styleBtn(activeCat,true);
}
function updateSlider(){
  const s=+document.getElementById("slider").value,mi=moodInfo(s);
  document.getElementById("s-emoji").textContent=mi.emoji;
  document.getElementById("s-num").textContent=s;
  document.getElementById("s-num").style.color=mi.hex;
  document.getElementById("slider").style.background=`linear-gradient(to right,${mi.hex} ${(s-1)/9*100}%,#D6D3CE ${(s-1)/9*100}%)`;
}
document.getElementById("slider").addEventListener("input",updateSlider);
function quickM(s){document.getElementById("slider").value=s;updateSlider();}
function toggleEmo(t){
  const i=selEmotions.indexOf(t);i>-1?selEmotions.splice(i,1):selEmotions.push(t);
  document.getElementById("ec-"+t).className="chip"+(selEmotions.includes(t)?" sel":"");
}
function styleBtn(k,on){
  const el=document.getElementById("cb-"+k);if(!el)return;
  const all={...DEFAULT_CATS};DB.customCats.forEach(c=>all[c.id]=c);
  const col=all[k]?.color||"#536070";
  if(on){el.style.background=col;el.style.color="#fff";el.style.borderColor=col;}
  else{el.style.background="";el.style.color="";el.style.borderColor="";}
}
function toggleCat(k){
  if(activeCat&&activeCat!==k)styleBtn(activeCat,false);
  activeCat=activeCat===k?null:k;
  if(activeCat)styleBtn(activeCat,true);else styleBtn(k,false);
  renderSub();
}
function renderSub(){
  const panel=document.getElementById("sub-panel"),content=document.getElementById("sub-content"),lbl=document.getElementById("sub-label");
  if(!activeCat){panel.style.display="none";return;}
  panel.style.display="block";
  if(activeCat==="friends"){
    const people=DB.profile.people||[];
    lbl.textContent="選擇相關人物，或直接描述事件：";
    let h="";
    if(people.length>0){
      h+=`<div class="chip-wrap mb12">${people.map(p=>{
        const sel=selFactors.some(f=>f.category==="friends"&&f.detail===p.name&&!f.isFree);
        return `<button class="chip${sel?" sel":""}" id="pchip-${p.id}" onclick="togglePerson('${p.id}','${p.name.replace(/'/g,"\\'")}')"  >👤 ${p.name}</button>`;
      }).join("")}</div>`;
    } else {
      h+=`<div style="font-size:12px;color:var(--faint);margin-bottom:10px;">可在「設定 → 我的人際圈」新增人物</div>`;
    }
    const curF=selFactors.find(f=>f.category==="friends"&&f.isFree);
    h+=`<label class="field-label">自由填寫事件（選填）</label>
      <input id="friend-free" placeholder="例：今天和朋友聊天很開心…" value="${curF?curF.detail:""}" oninput="updateFriendFree(this.value)"/>`;
    content.innerHTML=h;
  } else {
    const all={...DEFAULT_CATS};DB.customCats.forEach(c=>all[c.id]=c);
    const cat=all[activeCat];
    const isCustom=!!DB.customCats.find(c=>c.id===activeCat);
    if(isCustom||!cat?.sub?.length){
      lbl.textContent="描述發生了什麼：";
      const cur=selFactors.find(f=>f.category===activeCat);
      content.innerHTML=`<input id="custom-detail" placeholder="簡單描述..." value="${cur?cur.detail:""}" oninput="updateCustomDetail(this.value)"/>`;
    } else {
      lbl.textContent="選擇細項：";
      content.innerHTML=`<div class="chip-wrap">${cat.sub.map(s=>{
        const sel=selFactors.some(f=>f.category===activeCat&&f.detail===s);
        return `<button class="chip${sel?" sel":""}" onclick="toggleSub('${activeCat}','${s}')">${s}</button>`;
      }).join("")}</div>`;
    }
  }
  renderSelF();
}
function togglePerson(pid,name){
  const idx=selFactors.findIndex(f=>f.category==="friends"&&f.detail===name&&!f.isFree);
  idx>-1?selFactors.splice(idx,1):selFactors.push({category:"friends",detail:name});
  renderSub();renderSelF();
}
function updateFriendFree(v){
  selFactors=selFactors.filter(f=>!(f.category==="friends"&&f.isFree));
  if(v.trim())selFactors.push({category:"friends",detail:v.trim(),isFree:true});
  renderSelF();
}
function updateCustomDetail(v){
  selFactors=selFactors.filter(f=>f.category!==activeCat);
  if(v.trim())selFactors.push({category:activeCat,detail:v.trim()});
  renderSelF();
}
function toggleSub(cat,sub){
  const idx=selFactors.findIndex(f=>f.category===cat&&f.detail===sub);
  idx>-1?selFactors.splice(idx,1):selFactors.push({category:cat,detail:sub});
  renderSub();
}
function renderSelF(){
  const all={...DEFAULT_CATS};DB.customCats.forEach(c=>all[c.id]=c);
  document.getElementById("sel-factors").innerHTML=selFactors.map(f=>{
    const col=all[f.category]?.color||"#536070";
    return `<span style="display:inline-block;padding:4px 12px;border-radius:100px;font-size:12px;background:${col}18;color:${col};border:1px solid ${col}28;">${all[f.category]?.icon||""} ${f.detail}</span>`;
  }).join("");
}
function toggleCatForm(){const f=document.getElementById("cat-form");f.style.display=f.style.display==="none"?"block":"none";}
function closeCatForm(){document.getElementById("cat-form").style.display="none";}
function pickColor(el,c){newCatColor=c;document.querySelectorAll(".color-dot").forEach(d=>d.classList.remove("sel"));el.classList.add("sel");}
function addCustomCat(){
  const icon=document.getElementById("new-cat-icon").value.trim()||"⭐";
  const name=document.getElementById("new-cat-name").value.trim();
  if(!name){alert("請輸入類別名稱");return;}
  DB.customCats.push({id:"cc_"+Date.now(),label:name,icon,color:newCatColor,sub:[]});
  persist();document.getElementById("new-cat-icon").value="";document.getElementById("new-cat-name").value="";
  closeCatForm();renderCatRow();
}
function goStep(n){
  ["s0","s1","s2","s3","s-saved"].forEach(id=>document.getElementById(id).style.display="none");
  document.getElementById("s"+n).style.display="block";
  for(let i=0;i<4;i++){
    document.getElementById("b"+i).className="bar"+(i<=n?" done":"");
    document.getElementById("l"+i).className="seg-lbl"+(i===n?" active":"");
  }
}
function saveEntry(){
  const score=+document.getElementById("slider").value;
  const entry={id:"e_"+Date.now(),timestamp:new Date().toISOString(),moodScore:score,
    emotionTags:[...selEmotions],impactFactors:selFactors.map(f=>({category:f.category,detail:f.detail})),
    notes:document.getElementById("notes").value};
  const today=new Date().toDateString();
  DB.entries=DB.entries.filter(e=>new Date(e.timestamp).toDateString()!==today);
  DB.entries.push(entry);persist();
  document.getElementById("saved-e").textContent=moodInfo(score).emoji;
  document.getElementById("s3").style.display="none";
  document.getElementById("s-saved").style.display="block";
}
function resetTracker(){
  selEmotions=[];selFactors=[];activeCat=null;
  document.getElementById("slider").value=5;document.getElementById("notes").value="";
  updateSlider();initTracker();goStep(0);
}

        <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">💤 最低一天</div>
        <div style="font-size:26px;">${moodInfo(worst.moodScore).emoji}</div>
        <div style="font-size:19px;font-weight:700;color:#A07068;">${worst.moodScore}/10</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;">${new Date(worst.timestamp).toLocaleDateString("zh-TW",{month:"numeric",day:"numeric"})}</div>
      </div>
    </div>
    <div class="glass card-p mb12">
      <div class="sec-title">🎯 影響因子排行</div>
      ${impH||'<div style="font-size:13px;color:var(--muted);">尚無影響因子資料</div>'}
    </div>
    <div class="glass card-p dashed">
      <div class="sec-title" style="color:var(--pr-d);">🤖 AI 分析接口（未來擴充）</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.8;">・情緒日誌自動標籤化<br>・心情與天氣關聯分析<br>・紫微主星與心情週期對比<br>・人類圖「非自己主題」模式識別</div>
    </div>`;
}

/* ── PROFILE ── */
function loadProfile(){
  const p=DB.profile;
  document.getElementById("p-name").value=p.name||"";
  document.getElementById("p-bday").value=p.birthday||"";
  document.getElementById("p-btime").value=p.birthTime||"";
  document.getElementById("p-hdt").value=p.hdType||"";
  document.getElementById("p-hds").value=p.hdStrategy||"";
  document.getElementById("p-hda").value=p.hdAuthority||"";
  document.getElementById("p-zw").value=p.ziWeiStar||"";
  renderPeople();hdHint();zwHint();
}
function renderPeople(){
  const p=DB.profile.people||[];
  document.getElementById("people-list").innerHTML=p.length
    ?p.map(pr=>`<div class="person-row"><span style="font-size:15px;">👤</span>
        <span style="flex:1;font-size:14px;">${pr.name}</span>
        <button class="icon-btn" onclick="removePerson('${pr.id}')">✕</button></div>`).join("")
    :`<div style="font-size:13px;color:var(--faint);text-align:center;padding:10px 0;">尚未新增任何人</div>`;
}
function showAddPerson(){document.getElementById("add-person-form").style.display="block";}
function hideAddPerson(){document.getElementById("add-person-form").style.display="none";document.getElementById("new-person").value="";}
function addPerson(){
  const name=document.getElementById("new-person").value.trim();if(!name)return;
  if(!DB.profile.people)DB.profile.people=[];
  DB.profile.people.push({id:"p_"+Date.now(),name});persist();hideAddPerson();renderPeople();
}
function removePerson(id){DB.profile.people=DB.profile.people.filter(p=>p.id!==id);persist();renderPeople();}
function hdHint(){
  const t=document.getElementById("p-hdt").value,s=document.getElementById("p-hds").value,
        a=document.getElementById("p-hda").value,h=document.getElementById("hd-hint");
  if(t){h.style.display="block";h.innerHTML=`<b>策略：</b>${s||"未選"} &nbsp;·&nbsp; <b>權威：</b>${a||"未選"}`;}
  else h.style.display="none";
}
function zwHint(){
  const z=document.getElementById("p-zw").value,h=document.getElementById("zw-hint");
  if(z){h.style.display="block";h.textContent=`✦ ${z}星 — 對照資料預留接入點`;}else h.style.display="none";
}
function saveProfile(){
  DB.profile={...DB.profile,name:document.getElementById("p-name").value,
    birthday:document.getElementById("p-bday").value,birthTime:document.getElementById("p-btime").value,
    hdType:document.getElementById("p-hdt").value,hdStrategy:document.getElementById("p-hds").value,
    hdAuthority:document.getElementById("p-hda").value,ziWeiStar:document.getElementById("p-zw").value};
  persist();const b=document.getElementById("save-btn");b.textContent="✓ 已儲存！";setTimeout(()=>b.textContent="儲存設定",2500);
}
function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob),a=document.createElement("a");
  a.href=url;a.download=`wellness_${new Date().toISOString().split("T")[0]}.json`;a.click();URL.revokeObjectURL(url);
}
function clearDemo(){
  const cnt=DB.entries.filter(e=>e.isDemo).length;
  if(!cnt){alert("沒有示範資料可清除。");return;}
  if(!confirm(`確定清除 ${cnt} 筆示範資料？你自己的記錄不會被刪除。`))return;
  DB.entries=DB.entries.filter(e=>!e.isDemo);persist();renderHome();alert("示範資料已清除！");
}
function clearAll(){
  if(!confirm("⚠️ 確定清除所有記錄？此動作無法還原。"))return;
  if(!confirm("再次確認：所有心情記錄將永久刪除。"))return;
  DB.entries=[];persist();renderHome();alert("所有記錄已清除。");
}

initTracker();renderHome();
</script>
</body>
</html>
